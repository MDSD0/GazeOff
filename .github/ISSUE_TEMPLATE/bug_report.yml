name: Bug report
description: Tell us what went wrong in GazeOff.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve GazeOff. Please avoid including private information.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open…\n2. Choose…\n3. See…"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: GazeOff version
      placeholder: "0.1.1"
    validations:
      required: true
  - type: dropdown
    id: windows
    attributes:
      label: Windows version
      options:
        - Windows 11
        - Windows 10
        - Other
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Anything else?
      description: Screenshots and relevant details are welcome.
