name: Build Windows release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test

      - name: Build installers
        run: cargo tauri build --bundles msi,nsis

      - name: Stage installers
        shell: pwsh
        run: |
          Copy-Item (Get-ChildItem target\release\bundle\msi\*.msi | Select-Object -First 1) GazeOff-windows-x64.msi
          Copy-Item (Get-ChildItem target\release\bundle\nsis\*-setup.exe | Select-Object -First 1) GazeOff-windows-x64-setup.exe

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: GazeOff-windows-x64-installers
          path: |
            GazeOff-windows-x64.msi
            GazeOff-windows-x64-setup.exe
          if-no-files-found: error
