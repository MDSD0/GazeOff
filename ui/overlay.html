<style>
  * { box-sizing:border-box; margin:0; padding:0; user-select:none; }

  :root {

      --c-high    1800ms cubic-bezier(.2,.6,.2,1),
      --c-mid     1800ms cubic-bezier(.2,.6,.2,1),
      --c-low     1800ms cubic-bezier(.2,.6,.2,1),

    --accent:      #4a9df2; --ink: #f7eedb; --ink-soft: rgba(247, 238, 219, 0.78);

  body[data-state="afternoon"] {
    --c-zenith:  #081736; --c-high: #11295e; --c-mid: #214a91;

  body[data-state="dusk"], body[data-state="due"] {

    --accent:      #f19a63; --ink: #f7eedb; --ink-soft: rgba(247, 238, 219, 0.78);

  body[data-state="night"] {
    --c-zenith:  #000000; --c-high: #020205; --c-mid: #050614;
    --c-low:     #0a0d24; --c-horizon: #121633; --c-glow: #1c234a;
    --accent:      #475b94; --ink: #f7eedb; --ink-soft: rgba(247, 238, 219, 0.78);

  html, body { width:100%; height:100%; overflow:hidden; color:var(--ink); }
  html { background:transparent; }
  body { background:var(--c-zenith); font-family:var(--display); opacity:0; transition:opacity 620ms cubic-bezier(.2,0,0,1), background 600ms cubic-bezier(.2,.6,.2,1); }

    position: fixed; inset: 0; z-index: 0;

      to bottom,
      var(--c-zenith) 0%,

  .wallpaper {
    position: fixed; inset: -32px; z-index: 0;

  body.wallpaper-mode .wallpaper { opacity: 1; }
  body.wallpaper-mode .wallpaper.blur { filter: blur(var(--wallpaper-blur, 24px)); transform: scale(1.08); }

  body.leaving-wallpaper .wallpaper,
  body.leaving-wallpaper .wallpaper.blur {

  .drift {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none;
    opacity: 0.5;
    background:
      radial-gradient(ellipse 60% 40% at 30% 65%, color-mix(in oklab, var(--c-glow), transparent 70%) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 70% 70%, color-mix(in oklab, var(--c-low), transparent 75%) 0%, transparent 55%);
    animation: drift 90s infinite linear;
    transition: opacity 1200ms var(--ease);
  }
  @keyframes drift {
    0%   { transform: translateX(-3%) translateY(1%); }
    50%  { transform: translateX(2%)  translateY(-1%); }
    100% { transform: translateX(-3%) translateY(1%); }
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none; z-index: 3;
    opacity: 0.15;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='g'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='5'/><feColorMatrix values='0 0 0 0 0.95 0 0 0 0 0.85 0 0 0 0 0.65 0 0 0 0.3 0'/></filter><rect width='100%25' height='100%25' filter='url(%23g)' opacity='0.4'/></svg>");
  }

  body.display-off {
    --c-zenith:  #000;
    --c-high:    #000;
    --c-mid:     #000;
    --c-low:     #000;
    --c-horizon: #000;
    --c-glow:    #000;

    --accent:      #d8aa7c;
    --ink:         #f1eee7;
    --ink-soft:    rgba(241, 238, 231, 0.76);
    --ink-faint:   rgba(241, 238, 231, 0.48);
    --rule:        rgba(241, 238, 231, 0.22);
    background: #000;
  }
  body.display-off .sky, body.display-off .drift { display:none; }
  body.display-off .wallpaper { display:none; }
  body.display-off::after { display:none; }
  body.hide-messages .mast, body.hide-messages .headline { display:none; }

  .mast {
    position:fixed; top:38px; left:0; right:0; z-index:4;
    display:flex; justify-content:center; align-items:center;
    font-family:var(--display); color:var(--ink-faint); font-size:18px; font-weight:300; font-style:italic; letter-spacing:0;
  }

  .stage { position:fixed; inset:0; display:grid; place-items:center; padding:80px 56px 156px; z-index:4; text-align:center; }
  .piece { max-width:1040px; }
  .headline { font-family:var(--display); font-style:italic; font-weight:400; font-size:clamp(40px, 7vw, 68px); line-height:1.05; letter-spacing:-.02em; color:var(--ink); margin-bottom:28px; }
  .headline .thin { font-weight:300; color:var(--ink-soft); }

  .timer { margin:56px auto 0; width:min(480px, 70vw); }
  .readout { font-family:var(--display); font-size:clamp(40px, 7vw, 68px); font-weight:300; font-style:italic; color:var(--ink); font-variant-numeric:tabular-nums; margin-bottom: 8px;}
  .meter { height:1px; background:var(--rule); position:relative; overflow:hidden; }
  .bar { position:absolute; inset:0 auto 0 0; width:0%; background:var(--accent); transition:width .9s linear, background 1200ms var(--ease); }
  .label { margin-top:16px; font-family:var(--display); color:var(--ink-faint); font-size:15px; font-weight:300; font-style:italic; letter-spacing:0; }

  .actions { position:fixed; left:0; right:0; bottom: clamp(104px, 14vh, 176px); z-index:4; display:flex; flex-direction:column; gap:12px; align-items:center; justify-content:center; }
  .linkrow { display:flex; gap:28px; flex-wrap:wrap; justify-content:center; align-items:center; }

  /* Gentle, cumulative skip note. Same editorial voice as .label; the warmth
     of the colour (not the words) carries how overdue you are. Tone is set
     inline from the recovery state. */
  .skip-note {
    font-family:var(--display); font-size:14px; font-weight:300; font-style:italic;
    letter-spacing:0; color:var(--ink-faint); opacity:0; height:0; overflow:hidden;
    transition:opacity 600ms var(--ease), color 1200ms var(--ease);
  }
  .skip-note.show { opacity:.92; height:auto; }

  .skip-group { display: flex; align-items: center; gap: 8px; position: relative; }
  .skip-group::before {
    content:""; position:absolute; left:0; right:0; bottom:100%; height:14px;
  }
  .delay-opts {
    position:absolute; left:50%; bottom:calc(100% + 10px);
    display: flex; gap: 8px; opacity: 0; pointer-events: none;
    transform: translate(-50%, 8px);
    transition: opacity 180ms var(--ease), transform 180ms var(--ease);
  }
  .skip-group:hover .delay-opts, .skip-group:focus-within .delay-opts {
    opacity: 1; pointer-events: auto; transform: translate(-50%, 0);
  }
  .action.mini { padding: 10px 14px; min-width:60px; min-height: 36px; font-size: 16px; white-space:nowrap; }

  .action {
    display:none; appearance:none; background:transparent;
    font-family:var(--display); font-size:18px; font-weight:300; font-style:italic; letter-spacing:0;
    padding:14px 24px; cursor:pointer; min-height:46px; border-radius:999px;
    border: 1px solid color-mix(in oklab, var(--ink), transparent 72%); color: var(--ink-soft);
    transition:background 200ms var(--ease), border-color 200ms var(--ease), color 200ms var(--ease);
  }
  .action.on { display:inline-block; }
  .action:hover, .action:focus-visible { background:color-mix(in oklab, var(--ink), transparent 86%); color:var(--ink); border-color:color-mix(in oklab, var(--ink), transparent 45%); outline:none; }

  .action.primary { border-color: color-mix(in oklab, var(--accent), transparent 30%); color: var(--ink); background:color-mix(in oklab, var(--accent), transparent 94%); }
  .action.primary:hover, .action.primary:focus-visible { background:color-mix(in oklab, var(--accent), transparent 82%); color:var(--ink); border-color:var(--accent); }

  body.display-off .stage { padding:0; }
  body.display-off .mast, body.display-off .label { display:none; }
  body.display-off .piece { max-width:520px; }
  body.display-off .headline { display:none; }
  body.display-off .timer { margin:0 auto; width:320px; }
  body.display-off .readout { font-size:68px; color:var(--ink); }

  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation:none !important; transition:none !important; } }
  @media (max-width:760px) { .headline{font-size:32px}.sub{font-size:16px}.actions{bottom:72px}.linkrow{flex-direction:column; width:100%; max-width:280px; gap:10px}.action{width:100%; padding:16px 20px;}.delay-opts{position:static; transform:none; width:100%; justify-content:center; margin-top:4px}.skip-group{width:100%; flex-direction:column}.skip-group:hover .delay-opts,.skip-group:focus-within .delay-opts{transform:none}.mast{top:22px}.timer{width:82vw} }
</style>

<script>
const invoke = window.__TAURI__?.core?.invoke || (async()=>{});
const listen = window.__TAURI__?.event?.listen || (async()=>{});
const $ = id => document.getElementById(id);
const fmt = s => `${String(Math.floor(Math.max(0,s)/60)).padStart(2,'0')}:${String(Math.max(0,s)%60).padStart(2,'0')}`;
// Cycle through a category instead of picking at random: advance one line per
// break (taken or skipped) and shift the starting point by the hour, so the
// same line never lands twice in a row and the day doesn't always open the
// same way. A line may carry an optional third element = minimum skips today
// before it is eligible, so skip-count-specific lines ("two skips is crazy")
// only appear once that many skips have actually happened.
function cycleLine(arr, s){
  if (!arr || !arr.length) return ['',''];
  const d = s.day || {};
  const skipped = d.skipped || 0;
  const eligible = arr.filter(l => (l[2] || 0) <= skipped);
  const pool = eligible.length ? eligible : arr;
  const breaks = (d.taken || 0) + skipped;
  const hour = new Date().getHours();
  return pool[(breaks + hour) % pool.length];
}
const lines = {
  calm:{
    short:[
      ['Look up for a moment.','The distance is good for you.'],
      ['Rest your eyes.','Let the far wall do the work.'],
      ['Blink slowly.','Then find something farther away.'],
      ['Give your eyes','twenty quiet seconds.'],
      ['Stop reading the glow.','Read the room instead.'],
      ['Look beyond the screen.','Your focus will follow.'],
      ['Let your eyes travel.','They have been held close enough.'],
      ['Find the horizon,','even if it is only across the room.'],
      ['The screen will keep its place.','Your eyes need distance.'],
      ['Gaze off.','See how beautiful the sky is.'],
      ['Lift your gaze.','Let the world be larger than this window.'],
      ['Blink. Breathe.','Look farther.']
    ],
    long:[
      ['Leave the chair for a while.','Come back softer.'],
      ['Step away from the screen.','Your body needs the break too.'],
      ['Walk a little.','Let your eyes stop working so hard.'],
      ['Give your focus back to the room,','not the screen.'],
      ['Take a few quiet minutes','with no brightness in front of you.'],
      ['Move your shoulders.','Unclench your gaze.'],
      ['Stand up slowly.','Let the desk wait.'],
      ['Rest your eyes.','Change your distance, your posture, your pace.']
    ],
    due:[
      ['You have been close to the screen for long enough.','Look farther now.'],
      ['Your eyes have carried this session.','Give them a pause.'],
      ['This break matters.','Take it before the strain settles in.'],
      ['You stayed with the screen too long.','Step back for a moment.'],

    ],
    ret:[

      ['Return slowly.','Let your eyes settle first.'],

    ]
  },
  playful:{
    short:[
      ['Blink, twin.','The monitor is not your opp.'],
      ['Chat, we are staring','a little too hard.'],
      ['Look away real quick.','The pixels can wait.'],
      ['Your eyes are locked in.','Let them clock out for a sec.'],
      ['Morning check.','Blink before the day starts farming you.'],
      ['Midday screen stare is getting serious.','Look across the room.'],
      ['Night mode is not a personality.','Rest your eyes.'],
      ['Your blink rate','is fighting for its life.'],
      ['The screen won this round.','Blink and reset.'],
      ['Still staring?','Be so for real.'],
      ['The monitor is not going anywhere.','Look away.'],
      ['Look away','before your eyes start buffering.'],
      ['Touch distance.','Not grass, just distance.'],
      ['Blink like','you pay rent here.'],
      ['Go touch grass.','Indoor version counts.'],
      ['Caught staring in 4K.','Blink and look away.'],
      ['The screen is not him.','Give your eyes some distance.'],
      ['Log the eyeballs off','for twenty seconds.'],
      ['Your retinas are buffering.','Look at something far.'],
      ['Eye contact with the monitor is wild.','Look across the room.'],
      ['You skipped one. Fine.','But the eyes remember.', 1]
    ],
    long:[
      ['Stand up for a minute.','The desk does not own you.'],
      ['Stretch','before your posture becomes lore.']
    ],
    due:[
      ['We are not beating','the eye strain allegations.'],
      ['Your eyes are cooked,','respectfully.'],
      ['This is no longer focus.','This is pixel addiction.'],
      ['You stayed locked in too long.','Take this one.'],
      ['Twin, two skips is crazy.','Take this one.', 2],
      ['Third skip?','Beefing with basic self care now.', 3]
    ],
    ret:[
      ['Welcome back.','Tiny aura restored.'],
      ['Welcome back.','Soft focus, easy on the pixels.']
    ]
  }
};
let active=false, returning=false, lastKey='', blackOverride=null;
let wallpaperDataUrl = null;
function setClock(){ const d=new Date(); $('clock').textContent = d.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}); }
setClock(); setInterval(setClock, 15000);
function setText(a,b){ $('headline').innerHTML = `${a} <span class="thin">${b}</span>`; }
function getTimeBasedState() {
  const hour = new Date().getHours();
  if (hour >= 5 && hour < 7) return "dawn";
  if (hour >= 7 && hour < 10) return "morning";
  if (hour >= 10 && hour < 15) return "midday";
  if (hour >= 15 && hour < 17) return "afternoon";
  if (hour === 17) return "goldenHour";
  if (hour === 18) return "sunset";
  if (hour >= 19 && hour < 21) return "dusk";
  return "night"; // 21:00 to 04:59
}

function voiceLines(playful) {
  if (!playful) return lines.calm;
  return {
    short: lines.calm.short.concat(lines.playful.short),
    long: lines.calm.long.concat(lines.playful.long),
    due: lines.calm.due.concat(lines.playful.due),
    ret: lines.calm.ret.concat(lines.playful.ret)
  };
}

async function applyBackground(s) {
  const useWallpaper = s.bg_mode === 'wallpaper';
  document.body.classList.toggle('wallpaper-mode', useWallpaper);
  const wp = $('wallpaper');
  wp.classList.toggle('blur', s.bg_blur !== false);
  wp.style.setProperty('--wallpaper-blur', `${Math.max(0, Math.min(48, s.bg_blur_amount ?? 24))}px`);
  if (!useWallpaper) return;
  if (!wallpaperDataUrl) {
    try { wallpaperDataUrl = await invoke('wallpaper_data_url'); } catch(e) {}
  }
  if (wallpaperDataUrl) {
    wp.style.backgroundImage = `url("${wallpaperDataUrl}")`;
  } else {
    document.body.classList.remove('wallpaper-mode');
  }
}

// Skip pressure: the colour warms as the day's skipped count climbs, but the
// words stay kind. Tones are the same sage -> amber -> ember the rest of the
// app uses, so this sits naturally on any time-of-day sky.
function skipTone(n){
  if (n >= 3) return '#f19a63'; // ember
  if (n === 2) return '#e0935f';
  if (n === 1) return '#e8a874'; // amber
  return null;
}
function skipPhrase(n){
  if (n >= 3) return `${n} breaks skipped today. Your eyes are keeping count.`;
  if (n === 2) return 'two breaks waved off today';
  if (n === 1) return 'one break let pass today';
  return '';
}

async function render(s){
  document.body.classList.toggle('hide-messages', !!s.hide_messages);
  await applyBackground(s);
  document.body.dataset.state = getTimeBasedState();
  const voice = voiceLines(!!s.playful);
  const delayable = !!(s.brk && s.brk.can_delay && s.brk.t >= (s.brk.skip_at || 0));
  const skippable = !!(s.brk && s.brk.skippable && s.brk.t >= (s.brk.skip_at || 0));
  $('delay1').className = 'action' + (delayable ? ' on' : '');
  $('delay5').className = 'action' + (delayable ? ' on' : '');
  if(s.brk){
    document.body.classList.remove('leaving', 'leaving-sky', 'leaving-wallpaper');
    // small delay ensures the transition triggers properly when going from hidden to shown
    setTimeout(() => document.body.classList.add('in'), 20);
    const state = s.brk.force_locked || s.state === 'due' ? 'due' : (s.brk.long ? 'long' : 'short');
    // In the last few seconds, swap the headline to a "welcome back" line so the
    // return feels intentional rather than an abrupt cut.
    const endingSoon = (s.brk.dur - s.brk.t) <= 4 && (s.brk.dur - s.brk.t) > 0;
    const key = `${state}-${s.brk.long}-${s.playful}-${s.brk.force_locked}-${endingSoon}`;
    if(!active || key !== lastKey){
      active=true; returning=false; lastKey=key; blackOverride=null;
      const [a,b] = endingSoon
        ? cycleLine(voice.ret, s)
        : cycleLine(state === 'due' ? voice.due : s.brk.long ? voice.long : voice.short, s);
      setText(a,b);
    }
    const black = blackOverride ?? !!s.display_off_break;
    document.body.classList.toggle('display-off', black);
    $('displayOff').className = 'action on';
    $('displayOff').textContent = black ? 'Show background' : 'Use black background';
    $('mainBtn').className = 'action primary' + (skippable ? ' on' : '');
    const left = Math.max(0, s.brk.dur - s.brk.t);
    const pct = Math.min(1, Math.max(0, s.brk.t / Math.max(1, s.brk.dur)));
    $('time').textContent = fmt(left);
    $('bar').style.width = `${pct*100}%`;
    $('ringLabel').textContent = s.brk.long ? 'Move softly' : 'Look far';
    $('mainBtn').textContent = s.bg_mode === 'gradient' ? 'Skip this sky' : 'Skip this break';
    $('skipGroup').style.display = skippable ? 'flex' : 'none';

    // Warm the skip affordance + show a gentle running tally. This appears even
    // when skip is locked (focused mode), so the signal is never lost.
    const skipped = (s.day && s.day.skipped) || 0;
    const tone = skipTone(skipped);
    const note = $('skipNote');
    if (tone) {
      note.textContent = skipPhrase(skipped);
      note.style.color = tone;
      note.classList.add('show');
    } else {
      note.classList.remove('show');
    }
    $('mainBtn').style.color = tone || '';
    $('mainBtn').style.borderColor = tone ? `color-mix(in oklab, ${tone}, transparent 45%)` : '';
  } else if(s.returning > 0){
    $('skipNote').classList.remove('show');
    const black = document.body.classList.contains('display-off');
    const wallpaperExit = !black && s.bg_mode === 'wallpaper' && !!wallpaperDataUrl;
    document.body.classList.add('leaving');
    document.body.classList.toggle('leaving-wallpaper', wallpaperExit);
    document.body.classList.toggle('leaving-sky', !wallpaperExit);
    active=false; returning=true; lastKey='';
  }
}
$('delay1').onclick = () => invoke('delay_break',{secs:60});
$('delay5').onclick = () => invoke('delay_break',{secs:300});
$('mainBtn').onclick = () => invoke('skip_break');
$('displayOff').onclick = () => {
  blackOverride = !document.body.classList.contains('display-off');
  document.body.classList.toggle('display-off', blackOverride);
  $('displayOff').textContent = blackOverride ? 'Show background' : 'Use black background';
};
addEventListener('keydown', e => { if(e.key === 'Escape') invoke('skip_break'); });
addEventListener('contextmenu', e => e.preventDefault());
listen('snap', e => render(e.payload));
invoke('snapshot').then(v=>render(v||{state:'clear', returning:0, brk:{long:false,dur:40,t:8,skippable:true,can_delay:true,skip_at:3,end_at:28}})).catch(()=>render({state:'clear', returning:0, brk:{long:false,dur:40,t:8,skippable:true,can_delay:true,skip_at:3,end_at:28}}));
</script>
</body>
</html>
