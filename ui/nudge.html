<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing:border-box; margin:0; padding:0; user-select:none; pointer-events:none; }
  html,body {
    width:100%; height:100%; overflow:hidden; background:transparent;
    font-family:"Segoe UI Variable Text","Segoe UI",system-ui,sans-serif;
    color:rgba(245,245,240,.94);
  }
  .line {
    position:fixed; inset:0; display:flex; align-items:center;
    font-size:15px; line-height:1; font-weight:760; letter-spacing:0;
    text-shadow:
      0 2px 10px rgba(0,0,0,.82),
      0 0 24px rgba(0,0,0,.60);
    opacity:0; transform:translateY(4px);
    transition:opacity .14s ease, transform .14s ease;
    white-space:nowrap;
  }
  .line.in { opacity:1; transform:none; }
</style>
</head>
<body>
  <div class="line" id="line"></div>
<script>
const { listen } = window.__TAURI__.event;
let timer = null;

const COPY = {
  prebreak:["Break soon","Find a stopping point","Rest is close"],
  blink:["Blink slowly","Rest your eyes"],
  posture:["Drop your shoulders","Sit tall"],
  debt:["{m} min without a break"]
};
const pick = a => a[Math.floor(Math.random()*a.length)];

function show(text) {
  const line = document.getElementById("line");
  line.textContent = text;
  line.classList.remove("in"); void line.offsetWidth; line.classList.add("in");
}

function countdown(secs) {
  clearInterval(timer);
  let n = secs || 5;
  show(`Break in ${n}`);
  timer = setInterval(() => {
    n -= 1;
    if (n <= 0) return clearInterval(timer);
    show(`Break in ${n}`);
  }, 1000);
}

listen("nudge", e => {
  const { kind, secs, work_mins } = e.payload;
  clearInterval(timer);
  if (kind === "countdown") {
    countdown(secs || 5);
    return;
  }
  const deck = COPY[kind] || COPY.prebreak;
  show(pick(deck).replace("{m}", work_mins || 45));
});
addEventListener("contextmenu", e => e.preventDefault());
</script>
</body>
</html>
