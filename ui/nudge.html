<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="color-scheme" content="dark">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400;1,9..144,500;1,9..144,600;1,9..144,700&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
  :root {
    --bg: rgba(24, 24, 28, 0.75);
    --border: rgba(255, 255, 255, 0.1);
    --text: #f0f0f0;
    --sub: rgba(240, 240, 240, 0.62);
    --display: "Fraunces", Georgia, serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }

  :root[data-theme="light"] {
    --bg: rgba(250, 250, 250, 0.85);
    --border: rgba(0, 0, 0, 0.1);
    --text: #111;
    --sub: #555;
  }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: transparent; color: var(--text); font-family: var(--display);
  }

  body {
    display: flex; align-items: center; justify-content: center; padding: 4px;
    opacity: 0; transition: opacity 0.25s ease, transform 0.25s ease;
    transform: translateY(8px) scale(0.96);
  }
  body.in {
    opacity: 1; transform: translateY(0) scale(1);
  }
  .borderless-icon {
    --mark: #00c9ff;
    width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: transparent; color: var(--mark);
  }
  .borderless-icon.posture-icon { --mark: #00ffcc; }
  .reminder-art {
    width: 178px; height: 178px; overflow: visible;
    fill: none; stroke: var(--mark); stroke-width: 5;
    stroke-linecap: round; stroke-linejoin: round;
    animation: gentle-bob 2.8s ease-in-out infinite;
    filter: drop-shadow(0 0 12px color-mix(in srgb, var(--mark) 60%, transparent));
    will-change: transform, filter;
  }
  .posture-arrow {
    transform-origin: 50% 50%;
    animation: arrow-bounce 1.5s ease-in-out infinite;
    will-change: transform;
  }
  .blink-eye {
    transform-origin: 50% 50%;
    animation: cute-blink 2.8s linear infinite;
    will-change: transform;
  }
  .blink-eye.right { animation-delay: 36ms; }
  .blink-spark {
    fill: var(--mark); stroke: none;
    transform-origin: 50% 50%;
    animation: sparkle-pop 2.8s ease-in-out infinite;
  }
  .reminder-label {
    min-height: 22px; margin-top: -14px;
    color: var(--mark); font-size: 17px; font-weight: 500; font-style: italic;
    text-shadow: 0 2px 10px rgba(0,0,0,.6);
    opacity: .92;
  }
  .borderless-icon.no-label .reminder-label { display: none; }

  @keyframes gentle-bob {
    0%, 100% { transform: translateY(3px) scale(.98); }
    48% { transform: translateY(-4px) scale(1.02); }
    62% { transform: translateY(-2px) scale(1); }
  }
  @keyframes arrow-bounce {
    0%, 100% { transform: translateY(8px); }
    50% { transform: translateY(-12px); }
  }
  @keyframes cute-blink {
    0%, 28%, 36%, 44%, 100% { transform: scaleY(1); }
    31%, 40% { transform: scaleY(.08); }
    33%, 42% { transform: scaleY(.24); }
  }
  @keyframes sparkle-pop {
    0%, 42%, 100% { transform: scale(.25) rotate(-18deg); opacity: 0; }
    52% { transform: scale(1.15) rotate(8deg); opacity: .95; }
    66% { transform: scale(.8) rotate(18deg); opacity: .55; }
    78% { transform: scale(.25) rotate(28deg); opacity: 0; }
  }

  .borderless-text {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: flex-start;
    background: transparent; cursor: pointer;
  }
  .borderless-text:hover { transform: scale(1.05); }
  .blue-text {
    font-size: 16px; font-weight: 700; font-family: var(--display);
    color: #00C9FF;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }
  .prebreak-countdown {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: flex-start;
    background: transparent; pointer-events: none;
  }
  .countdown-number {
    width: 42px; height: 42px; display: grid; place-items: center;
    border: 1px solid #e8a874; border-radius: 50%;
    background: rgba(18, 22, 29, 0.94); color: #f2d7b8;
    font-family: var(--mono); font-size: 17px; font-weight: 400;
    box-shadow: 0 2px 8px rgba(0,0,0,.22);
    font-variant-numeric: tabular-nums;
  }
  .debt-card {
    width: max-content; height: 100%;
    display: flex; flex-direction: column; justify-content: center; align-items: flex-start;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
  }
  .debt-copy { min-width: 0; }
  .debt-title {
    font-size: 13px; font-weight: 700; line-height: 1.2;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .debt-subtitle {
    margin-top: 2px; font-size: 11px; font-weight: 600; color: var(--sub);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  @media (prefers-reduced-motion: reduce) {
    .reminder-art, .posture-upper, .blink-eye, .blink-spark { animation: none !important; }
  }
</style>
</head>
<body>
  <div class="pill" id="pill">
    <!-- Rendered content goes here -->
  </div>

<script>
const listen = window.__TAURI__?.event?.listen || (async()=>{});
const $ = id => document.getElementById(id);

// Pre-defined SVG icons
const icons = {
  posture: `<svg class="reminder-art" viewBox="0 0 200 200" aria-hidden="true">
    <g class="posture-arrow">
      <path d="M 100 145 V 55 M 60 95 L 100 55 L 140 95" style="stroke-width: 24px;" stroke-linecap="round" stroke-linejoin="round" />
    </g>
  </svg>`,
  blink: `<svg class="reminder-art" viewBox="0 0 200 200" aria-hidden="true">
    <path class="blink-eye left" d="M 40 100 Q 60 75 80 100" style="stroke-width: 20px;" stroke-linecap="round" fill="none" />
    <path class="blink-eye right" d="M 120 100 Q 140 75 160 100" style="stroke-width: 20px;" stroke-linecap="round" fill="none" />
  </svg>`,
  prebreak: `<svg viewBox="0 0 24 24"><path d="M12 22a10 10 0 100-20 10 10 0 000 20zM12 6v6l4 2"/></svg>`,
  debt: `<svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0zM12 9v4M12 17h.01"/></svg>`
};

function render(p) {
  document.body.classList.add('in');
  if (p.app_theme) {
    document.documentElement.setAttribute('data-theme', p.app_theme);
    document.querySelector('meta[name="color-scheme"]').setAttribute('content', p.app_theme);
  }

  const pill = $('pill');
  const labelState = p.show_reminder_text === false ? ' no-label' : '';

  if (p.kind === 'blink') {
    pill.className = 'borderless-icon blink-icon' + labelState;
    pill.onclick = null;
    pill.innerHTML = `${icons.blink}<div class="reminder-label">Blink</div>`;
  } else if (p.kind === 'posture') {
    pill.className = 'borderless-icon posture-icon' + labelState;
    pill.onclick = null;
    pill.innerHTML = `${icons.posture}<div class="reminder-label">Fix posture</div>`;
  } else if (p.kind === 'prebreak') {
    pill.className = 'prebreak-countdown';
    pill.onclick = null;
    pill.innerHTML = `<span class="countdown-number">${p.remain || 5}</span>`;
  } else if (p.kind === 'test_break') {
    pill.className = 'borderless-text';
    pill.onclick = null;
    pill.innerHTML = `<span class="blue-text">Test: ${p.remain || 5}s</span>`;
  } else if (p.kind === 'test_prebreak') {
    pill.className = 'prebreak-countdown';
    pill.onclick = null;
    pill.innerHTML = `<span class="countdown-number">${p.remain || 5}</span>`;
  } else {
    // Break debt
    const mins = Math.max(1, p.work_mins || 30);
    pill.className = 'debt-card';
    pill.onclick = null;
    pill.innerHTML = `
      <div class="debt-copy">
        <div class="debt-title">${mins} min without break</div>
        <div class="debt-subtitle">Take the next one.</div>
      </div>`;
  }
}

listen('nudge', e => render(e.payload));
addEventListener('contextmenu', e => e.preventDefault());

</script>
</body>
</html>
