<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing:border-box; margin:0; padding:0; user-select:none; }
  html,body {
    width:100%; height:100%; overflow:hidden; background:transparent;
    font-family:"Segoe UI Variable Text","Segoe UI",system-ui,sans-serif;
  }
  button {
    position:fixed; inset:0; border:0; border-radius:999px;
    color:rgba(248,246,238,.96);
    background:rgba(16,18,18,.58);
    font:inherit; font-size:12px; font-weight:760;
    text-shadow:0 1px 8px rgba(0,0,0,.72);
    cursor:pointer;
  }
  button:hover { background:rgba(16,18,18,.74); }
</style>
</head>
<body>
  <button id="skip">Skip</button>
<script>
const { invoke } = window.__TAURI__.core;
document.getElementById("skip").onclick = () => invoke("skip_pending_break");
addEventListener("contextmenu", e => e.preventDefault());
</script>
</body>
</html>
