<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="color-scheme" content="dark">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400;1,9..144,500;1,9..144,600;1,9..144,700&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

  :root {
    --c-bg: rgba(12, 14, 18, 0.65);
    --c-ink: #f7eedb;
    --c-ink-soft: rgba(247, 238, 219, 0.78);
    --c-ink-faint: rgba(247, 238, 219, 0.45);
    --c-accent: #b6cbd9;
    --c-rule: rgba(247, 238, 219, 0.12);
    --c-hover: rgba(255, 255, 255, 0.08);

    --display: 'Fraunces', Georgia, serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --ease: cubic-bezier(.2, .6, .2, 1);
  }

  :root[data-theme="light"] {
    --c-bg: rgba(255, 255, 255, 0.55);
    --c-ink: #111;
    --c-ink-soft: #444;
    --c-ink-faint: #888;
    --c-accent: #0b57d0;
    --c-rule: rgba(0, 0, 0, 0.1);
    --c-hover: rgba(0, 0, 0, 0.05);
  }

  /* Adjust panel border for light theme */
  body[data-theme="light"] .panel { border-color: rgba(0, 0, 0, 0.1); }

  body[data-state="clear"] { --c-accent: #b6cbd9; }
  body[data-state="accumulating"] { --c-accent: #e8a874; }
  body[data-state="due"] { --c-accent: #f19a63; }
  body[data-paused="true"] { --c-accent: #888888; }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    /* Darker tint over native Windows 11 glass */
    background: var(--c-bg); color: var(--c-ink);
    font-family: var(--display);
    transition: background 1.2s var(--ease);
  }

  .panel {
    position: relative;
    display: flex; flex-direction: column;
    height: 100%; padding: 0;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.06);
  }

  .status-module {
    position: relative;
    padding: 24px 20px;
    border-bottom: 1px solid var(--c-rule);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 140px;
    transition: background 300ms var(--ease);
  }

  .status-module:hover { background: var(--c-hover); }

  .status-default {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: absolute; inset: 0;
    transition: opacity 200ms var(--ease), transform 200ms var(--ease);
  }

  /* Health Badge Styles */
  .health-header {
    position: absolute; top: 16px; left: 20px;
    display: flex; align-items: center; gap: 8px;
    opacity: 1; transition: opacity 300ms var(--ease);
  }
  .health-ring {
    width: 16px; height: 16px;
    transform: rotate(-90deg);
  }
  .health-ring circle {
    fill: none; stroke-width: 2.5;
    stroke-linecap: round;
    transition: stroke-dasharray 1s var(--ease), stroke 1s var(--ease);
  }
  .health-ring .bg { stroke: var(--c-rule); }
  .health-ring .fg { stroke: var(--c-accent); stroke-dasharray: 0 63; }

  .health-text {
    font-family: var(--mono); font-size: 10px; font-weight: 400;
    letter-spacing: 0.15em; text-transform: uppercase; color: var(--c-ink-faint);
    transition: color 1s var(--ease);
  }

  .timer-container {
    display: flex; flex-direction: column; align-items: center;
  }

  .status-time {
    font-size: 32px; font-style: italic; font-weight: 300;
    color: var(--c-ink); line-height: 1; font-variant-numeric: tabular-nums;
  }

  .status-kicker {
    font-family: var(--mono); font-size: 10px; font-weight: 300;
    letter-spacing: 0.25em; text-transform: uppercase; color: var(--c-ink-faint);
    transition: color 400ms var(--ease);
  }

  .status-actions {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    opacity: 0; pointer-events: none; transform: translateY(8px);
    transition: opacity 200ms var(--ease), transform 200ms var(--ease);
    padding: 0 12px;
  }

  .status-module:hover .status-default { opacity: 0; transform: translateY(-8px); }
  .status-module:hover .status-actions { opacity: 1; pointer-events: auto; transform: translateY(0); }

  .quick-btn {
    appearance: none; background: transparent;
    border: 1px solid var(--c-rule); color: var(--c-ink-soft);
    font-family: var(--mono); font-size: 10px; font-weight: 300;
    letter-spacing: 0.15em; text-transform: uppercase;
    padding: 10px 12px; cursor: pointer; border-radius: 4px;
    transition: all 200ms var(--ease);
    flex: 1; text-align: center; white-space: nowrap;
  }
  .quick-btn:hover {
    background: var(--c-hover);
    color: var(--c-ink);
    border-color: var(--c-rule);
  }

  .menu {
    flex: 1; display: flex; flex-direction: column;
    padding: 12px 0;
  }

  .menu-item {
    appearance: none; background: transparent; border: none;
    width: 100%; text-align: left; padding: 14px 20px;
    display: flex; justify-content: space-between; align-items: baseline;
    cursor: pointer;
    transition: background 200ms var(--ease), padding-left 300ms var(--ease);
  }
  .menu-item:hover { background: var(--c-hover); padding-left: 26px; }

  .menu-title {
    font-family: var(--display); font-size: 16px; font-weight: 400; font-style: italic;
    color: var(--c-ink);
  }

  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }
</style>
</head>
<body data-state="clear">
<div class="panel">

  <div class="status-module" id="statusModule">
    <div class="status-default" id="statusDefault">

      <div class="health-header">
        <svg class="health-ring" viewBox="0 0 24 24">
          <circle class="bg" cx="12" cy="12" r="10"></circle>
          <circle class="fg" id="healthRingFg" cx="12" cy="12" r="10"></circle>
        </svg>
        <div class="health-text" id="healthText">awaiting data</div>
      </div>

      <div class="timer-container">
        <div class="status-time" id="time">--</div>
        <div class="status-kicker" id="kicker">next break</div>
      </div>
    </div>
    <div class="status-actions" id="statusActions">
      <button class="quick-btn" id="delay1">+1m</button>
      <button class="quick-btn" id="delay5">+5m</button>
      <button class="quick-btn" id="skipNext">skip</button>
    </div>
  </div>

  <div class="menu">
    <button class="menu-item" id="breakNow">
      <span class="menu-title">Take Break</span>
    </button>
    <button class="menu-item" id="pauseToggle">
      <span class="menu-title" id="pauseLabel">Pause</span>
    </button>
    <button class="menu-item" id="settingsBtn">
      <span class="menu-title">Studio</span>
    </button>
  </div>
</div>

<script>
const invoke = window.__TAURI__?.core?.invoke || (async()=>{});
const listen = window.__TAURI__?.event?.listen || (async()=>{});
const $ = id => document.getElementById(id);

// Precision time formatter
const formatTime = s => {
  if (s == null) return '--';
  return s < 60 ? `${s}s` : `${Math.ceil(s/60)}m`;
};

let isPending = false;
let isDue = false;

async function render(s) {
  document.body.dataset.state = s.state || 'clear';
  document.body.dataset.paused = !!s.paused;
  if (s.app_theme) {
    document.documentElement.setAttribute('data-theme', s.app_theme);
    document.body.setAttribute('data-theme', s.app_theme);
    document.querySelector('meta[name="color-scheme"]').setAttribute('content', s.app_theme);
  }

  const paused = !!s.paused;
  const brk = !!s.brk;
  isPending = s.state === 'accumulating' || brk;
  isDue = s.state === 'due';

  if (paused) {
    $('kicker').textContent = 'timer held';
    $('kicker').style.color = 'transparent'; // Hide kicker to prevent double text
    $('time').textContent = 'Paused';
    $('time').style.fontSize = '24px';
  } else if (brk) {
    $('kicker').textContent = 'resting';
    $('kicker').style.color = 'var(--c-accent)';
    $('time').textContent = 'Now';
    $('time').style.fontSize = '24px';
  } else if (isDue) {
    $('kicker').textContent = 'overdue';
    $('kicker').style.color = '#ef4444';
    $('time').textContent = 'Due';
    $('time').style.fontSize = '24px';
  } else {
    $('kicker').textContent = 'next break';
    $('kicker').style.color = 'var(--c-ink-faint)';
    $('time').textContent = formatTime(s.next_in);
    $('time').style.fontSize = '32px';
  }

  $('pauseLabel').textContent = paused ? 'Resume' : 'Pause';

  // Update Health Ring using get_recovery_score
  try {
    const sessionsCount = (s.day && s.day.sessions) ? s.day.sessions.length : 0;
    const ring = $('healthRingFg');
    const text = $('healthText');

    if (sessionsCount === 0) {
      ring.style.strokeDasharray = '0 63';
      ring.style.stroke = 'var(--c-rule)';
      text.textContent = 'awaiting data';
      text.style.color = 'var(--c-ink-faint)';
    } else {
      const score = await invoke('get_recovery_score');
      // Circumference of r=10 is ~62.8
      const val = (score / 100) * 62.8;
      ring.style.strokeDasharray = `${val} 63`;

      let phrase = "healthy";
      let color = "#4ade80"; // Vibrant Green

      // Tightened Scientific Thresholds
      if (score < 60) {
        phrase = "exhausted";
        color = "#ef4444"; // Vibrant Red
      } else if (score < 90) {
        phrase = "needs rest";
        color = "#fbbf24"; // Vibrant Amber/Orange
      }

      ring.style.stroke = color;
      text.textContent = phrase;
      text.style.color = color;
    }
  } catch (e) {
    console.error("Health update failed", e);
  }

  $('skipNext').onclick = (e) => { e.stopPropagation(); invoke('skip_break'); };

  // Calculate work done to prevent skip spamming
  const workDone = (s.interval || 1200) - (s.next_in || 0);

  // Block skip button if the user just took a break or skipped (less than 60s ago)
  if (workDone < 60 && !s.brk) {
    $('skipNext').style.opacity = '0.5';
    $('skipNext').style.pointerEvents = 'none';
  } else {
    $('skipNext').style.opacity = '1';
    $('skipNext').style.pointerEvents = 'auto';
  }
}

$('delay1').onclick = (e) => { e.stopPropagation(); invoke('delay_break', {secs:60}); };
$('delay5').onclick = (e) => { e.stopPropagation(); invoke('delay_break', {secs:300}); };

$('breakNow').onclick = () => invoke('break_now');
$('pauseToggle').onclick = () => invoke('toggle_pause');
$('settingsBtn').onclick = () => invoke('open_settings');

listen('snap', e => render(e.payload));
listen('play-sound', e => {
  try {
    const { file, volume } = e.payload;
    if (!file) return;
    const audio = new Audio(`assets/sounds/${file}`);
    audio.volume = (volume || 50) / 100.0;
    audio.play().catch(err => console.error("Audio play error:", err));
  } catch(e) {}
});

invoke('snapshot').then(v => render(v)).catch(() => {});
addEventListener('contextmenu', e => e.preventDefault());
</script>
</body>
</html>
