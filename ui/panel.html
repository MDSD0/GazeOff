<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing:border-box; margin:0; padding:0; user-select:none; }
  html,body {
    width:100%; height:100%; overflow:hidden; background:transparent;
    font-family:"Segoe UI Variable Text","Segoe UI",system-ui,sans-serif; color:#f2f2ef;
    --acc:#8fbfa3; --accSoft:rgba(143,191,163,.18);
  }
  .menu {
    position:fixed; inset:0; border-radius:10px; overflow:hidden;
    background:
      linear-gradient(180deg,rgba(37,42,39,.98),rgba(24,27,25,.985)),
      radial-gradient(120% 80% at 86% -8%, var(--accSoft), transparent 64%);
    box-shadow:0 18px 48px rgba(0,0,0,.42);
    padding:12px;
  }
  .menu::before {
    content:""; position:absolute; left:0; right:0; top:0; height:3px;
    background:linear-gradient(90deg,#8fbfa3,#80b9d8,#f0b56f);
  }
  .top { padding:10px 10px 12px; }
  .eyebrow { color:rgba(242,242,239,.42); font-size:14px; font-weight:750; margin-bottom:6px; }
  .status { display:flex; align-items:center; gap:12px; }
  .face {
    width:42px; height:42px; border-radius:10px; display:grid; place-items:center;
    background:
      linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.025)),
      radial-gradient(80% 90% at 50% 76%, rgba(240,181,111,.34), transparent 58%);
  }
  .face svg { width:28px; height:28px; stroke:#e8eee7; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .status-main { flex:1; min-width:0; }
  .word { font-size:19px; font-weight:780; line-height:1.15; }
  .sub { color:rgba(242,242,239,.58); font-size:13px; margin-top:3px; font-weight:560; line-height:1.25; }
  .timer {
    min-width:64px; height:34px; border-radius:999px; display:grid; place-items:center;
    color:#121412; background:#e7ece5; font-size:17px; font-weight:820; font-variant-numeric:tabular-nums;
  }
  .sep { height:1px; background:rgba(255,255,255,.10); margin:7px 0; }
  .item {
    width:100%; min-height:46px; display:flex; align-items:center; gap:12px;
    padding:0 10px; border:0; border-radius:9px; background:transparent; color:#f2f2ef;
    font:inherit; font-size:18px; font-weight:690; text-align:left; cursor:pointer;
  }
  .item:hover { background:rgba(255,255,255,.075); }
  .item.primary { background:#e7ece5; color:#151715; }
  .item svg { width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; opacity:.95; }
  .item .grow { flex:1; }
  .hint { color:rgba(242,242,239,.42); font-size:13px; font-weight:700; }
  .item.primary .hint { color:rgba(21,23,21,.55); }
  .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:8px 2px 4px; }
  .stat { border-radius:8px; background:rgba(255,255,255,.055); padding:10px 4px 9px; text-align:center; }
  .stat .n { font-size:18px; font-weight:780; font-variant-numeric:tabular-nums; }
  .stat .l { margin-top:2px; font-size:11px; color:rgba(242,242,239,.44); text-transform:uppercase; letter-spacing:.06em; font-weight:760; }
  .spark {
    height:50px; display:flex; align-items:flex-end; gap:4px; margin:8px 2px 2px; padding:8px 8px 6px;
    border-radius:8px; background:rgba(255,255,255,.04);
  }
  .bar { flex:1; max-width:16px; min-height:4px; border-radius:3px 3px 1px 1px; background:rgba(140,198,166,.8); }
  .bar.miss { background:rgba(224,122,93,.82); }
  .empty { margin:auto; color:rgba(242,242,239,.36); font-size:12px; font-weight:650; }
</style>
</head>
<body>
<div class="menu">
  <div class="top">
    <div class="eyebrow" id="eyebrow">1 minute without a break</div>
    <div class="status">
      <div class="face"><svg viewBox="0 0 32 32"><path d="M5 20c4-6 8-9 12-9s7 3 10 9"/><path d="M8 21h18"/><path d="M11 24h10"/></svg></div>
      <div class="status-main"><div class="word" id="word"></div><div class="sub" id="hsub"></div></div>
      <div class="timer" id="timer">19m</div>
    </div>
  </div>
  <div class="sep"></div>
  <button class="item primary" onclick="invoke('break_now')"><svg viewBox="0 0 24 24"><path d="M5 12h12M13 6l6 6-6 6"/></svg><span class="grow">Start this break now</span></button>
  <button class="item" id="pause" onclick="invoke('toggle_pause')"><svg viewBox="0 0 24 24"><path d="M8 5v14M16 5v14"/></svg><span class="grow">Pause for an hour</span></button>
  <button class="item" onclick="invoke('open_settings')"><svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h10M4 17h16"/><path d="M16 12h4"/></svg><span class="grow">Open studio</span><span class="hint">settings</span></button>
  <div class="sep"></div>
  <div class="stats">
    <div class="stat"><div class="n" id="taken">0</div><div class="l">breaks</div></div>
    <div class="stat"><div class="n" id="skipped">0</div><div class="l">skipped</div></div>
    <div class="stat"><div class="n" id="longest">0m</div><div class="l">longest</div></div>
  </div>
  <div class="spark" id="spark"></div>
</div>

<script>
const { invoke } = window.__TAURI__.core;
const { listen } = window.__TAURI__.event;
const WORD = { clear:"Your break begins soon", accumulating:"Longer than usual", due:"Break due now" };
const ACC = { clear:["#8cc6a6","rgba(140,198,166,.18)"], accumulating:["#d7b16d","rgba(215,177,109,.18)"], due:["#e07a5d","rgba(224,122,93,.18)"] };
function render(s) {
  const [acc, soft] = s.paused ? ["#a7a7a1","rgba(167,167,161,.13)"] : (ACC[s.state] || ACC.clear);
  document.body.style.setProperty("--acc", acc);
  document.body.style.setProperty("--accSoft", soft);
  const m = Math.max(1, Math.round(s.next_in / 60));
  document.getElementById("timer").textContent = s.brk ? "now" : `${m}m`;
  document.getElementById("word").textContent = s.paused ? "Paused" : (WORD[s.state] || WORD.clear);
  document.getElementById("eyebrow").textContent = s.brk ? "Break in progress" : `${Math.max(0, Math.round((s.interval - s.next_in) / 60))} minutes without a break`;
  document.getElementById("hsub").textContent =
    s.paused ? "Breaks are resting." :
    s.brk ? "Rest now, resume shortly." :
    s.debt > 0 ? `${s.debt} skipped recently. Let the next one land.` :
    `Next break in ${m} min.`;
  document.getElementById("pause").querySelector(".grow").textContent = s.paused ? "Resume" : "Pause for an hour";
  document.getElementById("taken").textContent = s.day.taken;
  document.getElementById("skipped").textContent = s.day.skipped;
  document.getElementById("longest").textContent = Math.round(s.day.longest / 60) + "m";
  const ses = (s.day.sessions || []).slice(-18);
  document.getElementById("spark").innerHTML = ses.length === 0
    ? '<div class="empty">Sessions appear here through the day.</div>'
    : ses.map(([mins, ok]) => `<div class="bar${ok ? "" : " miss"}" style="height:${5 + Math.min(mins,60)/60*34}px"></div>`).join("");
}
listen("snap", e => render(e.payload));
invoke("snapshot").then(render);
addEventListener("contextmenu", e => e.preventDefault());
</script>
</body>
</html>
